name = "test0"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MathlibExamples"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
version = "git#c557aff44d3a75bd6d9c53284ede626928f4cf76"

[[lean_lib]]
name = "MathlibExamples"
